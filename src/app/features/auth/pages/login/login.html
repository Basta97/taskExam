<section class="w-full mx-auto space-y-8">
  <div class="text-left">
    <h2 class="text-3xl font-extrabold text-[#001D3D]">Login</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6 w-[50vh]">
    <div class="space-y-2">
      <label class="block text-sm font-semibold text-[#001D3D]" for="username">Username</label>
      <input
        id="username"
        formControlName="username"
        type="text"
        placeholder="user123"
        class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
        [ngClass]="{'border-red-500 text-red-500': form.get('username')?.invalid && form.get('username')?.touched, 'border-gray-200': !form.get('username')?.invalid || !form.get('username')?.touched}"
      />
      <p *ngIf="form.get('username')?.invalid && form.get('username')?.touched" class="text-xs text-red-500 mt-1 font-geist-mono">
        Your username is required
      </p>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-semibold text-[#001D3D]" for="password">Password</label>
      <div class="relative">
        <input
          id="password"
          formControlName="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="********"
          class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
          [ngClass]="{'border-red-500 text-red-500': form.get('password')?.invalid && form.get('password')?.touched, 'border-gray-200': !form.get('password')?.invalid || !form.get('password')?.touched}"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
        >
          <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.04976 3.807C9.7968 3.5988 11.564 3.96811 13.0814 4.85854C14.5989 5.74896 15.7832 7.11156 16.4535 8.73825C16.516 8.90664 16.516 9.09186 16.4535 9.26025C16.1779 9.9285 15.8136 10.5566 15.3705 11.1277M10.563 10.6185C10.1387 11.0284 9.5703 11.2551 8.98036 11.25C8.39042 11.2449 7.82609 11.0083 7.40892 10.5911C6.99175 10.1739 6.75512 9.6096 6.75 9.01965C6.74487 8.42971 6.97166 7.86136 7.38151 7.437M13.1093 13.1243C12.1144 13.7136 11.0044 14.082 9.85453 14.2045C8.70471 14.3271 7.54198 14.2008 6.44524 13.8344C5.3485 13.468 4.34341 12.8699 3.49817 12.0808C2.65293 11.2917 1.98733 10.33 1.54651 9.261C1.48401 9.09261 1.48401 8.90739 1.54651 8.739C2.21149 7.12639 3.38152 5.77294 4.88101 4.88175M1.50001 1.5L16.5 16.5" stroke="#9CA3AF" stroke-width="0.9375" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="text-xs text-red-500 mt-1 font-geist-mono">
        Password is required
      </p>
    </div>

    <div class="flex justify-end">
      <a routerLink="/auth/forgot-password" class="text-sm font-semibold text-blue-600 hover:underline transition-all">Forgot your password?</a>
    </div>

    @if (showErrorBox) {
      <div class="relative flex items-center justify-center p-4 bg-red-50 border border-red-300 rounded-lg">
        <span class="text-red-500 font-medium font-geist-mono">{{ errMsg }}</span>
        <button type="button" (click)="closeErrorBox()" class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border border-red-300 rounded-full flex items-center justify-center text-red-500 hover:bg-gray-50 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    }

    <div>
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-[#155DFC] text-white font-bold py-4 rounded-md hover:bg-blue-700 transition-colors focus:ring-4 focus:ring-blue-200 disabled:opacity-50"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </div>

    <div class="text-center">
      <p class="text-sm text-gray-500 font-medium font-geist-mono">
        Don't have an account? <a routerLink="/auth/register" class="text-blue-600 hover:underline">Create yours</a>
      </p>
    </div>
  </form>
</section>

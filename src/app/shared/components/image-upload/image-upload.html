<div class="space-y-2">
  <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono">{{ label }}</label>
  <div
    class="relative border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-colors"
    [ngClass]="dragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300 hover:border-blue-400'"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="fileInput.click()"
  >
    <input #fileInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
    @if (preview || currentImage) {
      <div class="space-y-2">
        <img [src]="preview || currentImage" alt="Preview" class="mx-auto max-h-40 rounded-md object-cover" />
        @if (uploading) {
          <p class="text-sm text-blue-600 font-geist-mono">Uploading...</p>
        }
      </div>
    } @else {
      <div class="space-y-2">
        <svg class="mx-auto w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-sm text-gray-500 font-geist-mono">Drag & drop or click to upload</p>
      </div>
    }
  </div>
  @if (error) {
    <p class="text-xs text-red-500 font-geist-mono">{{ error }}</p>
  }
</div>
